<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Latidos Niños — Tus premios, medallas y logros conseguidos." />
  <title>Premios — Latidos Niños</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .trophy-banner {
      background: linear-gradient(135deg, var(--yellow), var(--orange));
      border-radius: var(--radius-xl); padding: 28px 24px;
      display: flex; align-items: center; gap: 20px;
      box-shadow: var(--shadow-lg); margin-bottom: 32px; color: #fff;
    }
    .trophy-icon  { font-size: 3.5rem; flex-shrink: 0; }
    .trophy-name  { font-size: 1.3rem; font-weight: 900; }
    .trophy-sub   { font-size: 0.88rem; opacity: 0.88; font-weight: 600; margin-top: 2px; }

    .stat-card {
      background: #fff; border-radius: var(--radius-lg); padding: 20px;
      text-align: center; box-shadow: var(--shadow-sm);
    }
    .stat-card-num { font-size: 2.4rem; font-weight: 900; }
    .stat-card-lbl { font-size: 0.78rem; color: var(--text-mid); font-weight: 700; margin-top: 4px; }

    .module-progress { display: flex; flex-direction: column; gap: 16px; }
    .mp-row { display: flex; align-items: center; gap: 14px; }
    .mp-icon { font-size: 1.6rem; width: 36px; text-align: center; }
    .mp-name { font-size: 0.88rem; font-weight: 700; min-width: 90px; }
    .mp-stars { display: flex; gap: 3px; }
    .mp-stars .star { font-size: 1.1rem; }
    .mp-bar-wrap { flex: 1; }
  </style>
</head>
<body>
  <div id="navbar-container"></div>

  <main class="main-content">
    <div class="container">

      <div class="page-header">
        <span class="page-emoji">🏆</span>
        <h1>Tus <span style="color:var(--coral);">Premios</span></h1>
        <p>¡Mira todo lo que has logrado!</p>
      </div>

      <!-- Trophy banner -->
      <div class="trophy-banner" id="trophy-banner">
        <span class="trophy-icon" id="trophy-char"></span>
        <div>
          <div class="trophy-name" id="trophy-name"></div>
          <div class="trophy-sub"  id="trophy-sub"></div>
        </div>
        <div style="margin-left:auto; text-align:right;">
          <div class="level-badge" id="trophy-level"></div>
          <div style="font-size:0.8rem; opacity:0.88; margin-top:6px;" id="trophy-hearts"></div>
        </div>
      </div>

      <!-- Quick stats -->
      <div class="grid-3 mb-24">
        <div class="stat-card" style="border-top:4px solid var(--coral);">
          <div class="stat-card-num" style="color:var(--coral);" id="sw-hearts"></div>
          <div class="stat-card-lbl">💖 Corazones totales</div>
        </div>
        <div class="stat-card" style="border-top:4px solid var(--yellow);">
          <div class="stat-card-num" style="color:var(--yellow-dark);" id="sw-stars"></div>
          <div class="stat-card-lbl">⭐ Estrellas ganadas</div>
        </div>
        <div class="stat-card" style="border-top:4px solid var(--purple);">
          <div class="stat-card-num" style="color:var(--purple);" id="sw-badges"></div>
          <div class="stat-card-lbl">🏅 Medallas</div>
        </div>
      </div>

      <!-- Module progress -->
      <div class="section">
        <h2 class="section-title">📊 Progreso por módulo</h2>
        <div class="card">
          <div class="module-progress" id="module-progress"></div>
        </div>
      </div>

      <!-- Badges -->
      <div class="section">
        <h2 class="section-title">🏅 Medallas</h2>
        <div class="badge-grid" id="badge-grid"></div>
      </div>

      <!-- Encouragement -->
      <div class="card text-center mt-24" style="background: linear-gradient(135deg,var(--purple-light),var(--blue-light)); border:none;">
        <p style="font-size:1.1rem; font-weight:800; color:var(--purple-dark);" id="encourage-msg"></p>
      </div>

    </div>
  </main>

  <script src="../js/app.js"></script>
  <script src="../js/sounds.js"></script>
  <script src="../js/rewards.js"></script>
</body>
</html>
